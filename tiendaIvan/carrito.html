<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tienda Online</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">
  <h2>Carrito de Compras</h2>

  <table class="table mt-4">
    <thead>
      <tr>
        <th>Producto</th>
        <th>Precio</th>
        <th>Cantidad</th>
        <th>Subtotal</th>
        <th>Eliminar</th>
      </tr>
    </thead>
    <tbody>
      <tr>
        <td>Producto 1</td>
        <td>$500</td>
        <td><input type="number" value="1" class="form-control" style="width:80px;"></td>
        <td>$500</td>
        <td><button class="btn btn-danger">X</button></td>
      </tr>
    </tbody>
  </table>

  <div class="row">
    <div class="col-md-6">
      <input type="text" class="form-control" placeholder="Código de descuento">
      <button class="btn btn-secondary mt-2">Aplicar cupón</button>
    </div>

    <div class="col-md-6 text-end">
      <h5>Subtotal: $500</h5>
      <h5>Impuestos: $80</h5>
      <h4>Total: $580</h4>
      <a href="galeria.html" class="btn btn-outline-primary">Seguir comprando</a>
      <button class="btn btn-success">Proceder al pago</button>
    </div>
  </div>
</div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
